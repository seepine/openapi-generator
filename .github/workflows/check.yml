name: Check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Tsc
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true

      - name: Build
        run: pnpm build
